<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>S4.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S4.6">
<script src="https://js.puter.com/v2/"></script>
<style>
  html {
    touch-action: manipulation;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #faf9f5;
    color: #3d3d3a;
    height: 100vh;
    height: calc(var(--vh, 1vh) * 100);
    display: flex;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    padding-top: env(safe-area-inset-top);
    padding-right: env(safe-area-inset-right);
    padding-left: env(safe-area-inset-left);
  }

  #input, #memoryText, #chat, .msg, #chatList {
    -webkit-user-select: text;
    user-select: text;
  }

  #sidebar {
    width: 260px;
    background: #f4f3ee;
    border-right: 1px solid #e5e3da;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .2s ease;
  }

  #brand {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 20px;
    padding: 18px 16px 10px;
    color: #3d3d3a;
  }

  #newChatBtn {
    margin: 6px 12px 12px;
    padding: 10px;
    border: 1px solid #d8d5c9;
    border-radius: 10px;
    background: #ffffff;
    color: #3d3d3a;
    cursor: pointer;
    text-align: left;
    font-size: 14px;
  }

  #newChatBtn:hover { background: #eeece2; }

  #chatList { flex: 1; overflow-y: auto; padding: 0 8px; }

  .chatItem {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: #6b685f;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
  }

  .chatItem:hover { background: #eeece2; }
  .chatItem.active { background: #ede6da; color: #3d3d3a; }
  .chatItem .del { opacity: 0; font-size: 12px; color: #a39d8c; }
  .chatItem:hover .del { opacity: 1; }

  #memoryBtn {
    margin: 8px 12px 14px;
    padding: 8px 10px;
    border: 1px solid #d8d5c9;
    border-radius: 10px;
    background: #ffffff;
    color: #6b685f;
    cursor: pointer;
    font-size: 12px;
  }

  #memoryBtn:hover { background: #eeece2; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: #faf9f5;
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
    border-bottom: 1px solid #ece9e0;
    flex-shrink: 0;
  }

  #burger {
    background: none;
    border: none;
    color: #6b685f;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  #burger:hover { background: #ece9e0; }

  #titleBar { font-size: 14px; color: #a39d8c; letter-spacing: .3px; }

  #chat {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 72%;
    padding: 11px 16px;
    border-radius: 18px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 15px;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .user { align-self: flex-end; background: #da7756; color: #fff; }
  .bot { align-self: flex-start; background: #f0eee6; color: #3d3d3a; }
  .sys { align-self: center; background: transparent; color: #a39d8c; font-size: 12px; font-style: italic; }

  #imgPreview { display: none; padding: 0 16px 8px; flex-shrink: 0; }
  #imgPreview.show { display: flex; align-items: center; gap: 8px; }
  #imgPreview img { height: 48px; border-radius: 8px; }
  #imgPreview span { font-size: 12px; color: #a39d8c; cursor: pointer; }
  .msgImg { max-width: 100%; height: auto; border-radius: 12px; display: block; margin-top: 6px; }

  #inputBar {
    display: flex;
    gap: 8px;
    padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
    align-items: center;
    flex-shrink: 0;
    flex-wrap: nowrap;
    background: #faf9f5;
    border-top: 1px solid #ece9e0;
  }

  #input {
    flex: 1;
    min-width: 0;
    padding: 12px 16px;
    border-radius: 24px;
    border: 1px solid #d8d5c9;
    background: #fff;
    color: #3d3d3a;
    font-size: 16px;
    outline: none;
  }

  #input:focus { border-color: #da7756; }

  #send {
    padding: 0 18px;
    height: 40px;
    border: none;
    border-radius: 24px;
    background: #da7756;
    color: white;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
  }

  #send:hover { background: #c8663f; }
  #send:disabled { background: #d8d5c9; cursor: default; }

  .iconBtn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid #d8d5c9;
    background: #fff;
    color: #6b685f;
    cursor: pointer;
    font-size: 15px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .iconBtn:hover { background: #eeece2; }
  .iconBtn.recording { background: #da7756; color: #fff; border-color: #da7756; }

  #memoryModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,61,58,.4);
    align-items: center;
    justify-content: center;
    z-index: 30;
    padding: 16px;
  }

  #memoryModal.show { display: flex; }

  #memoryBox {
    background: #faf9f5;
    border-radius: 14px;
    padding: 20px;
    width: min(90vw, 480px);
    border: 1px solid #e5e3da;
  }

  #memoryBox h3 { margin-top: 0; font-size: 15px; font-weight: 600; color: #3d3d3a; }

  #memoryText {
    width: 100%;
    height: 160px;
    background: #fff;
    color: #3d3d3a;
    border: 1px solid #d8d5c9;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    resize: vertical;
  }

  #memoryBox .row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  #memoryBox button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
  #memClose { background: #ece9e0; color: #6b685f; }
  #memSave { background: #da7756; color: white; }

  @media (max-width: 820px) {
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 40;
      width: min(86vw, 320px);
      transform: translateX(-100%);
      box-shadow: 8px 0 24px rgba(0,0,0,.08);
    }

    #sidebar:not(.hidden) { transform: translateX(0); }

    #chat { padding: 14px; gap: 10px; }
    .msg { max-width: 88%; font-size: 16px; }
  }
</style>
</head>
<body>

<div id="sidebar" class="hidden">
  <div id="brand">S4.6</div>
  <button id="newChatBtn">+ Новый чат</button>
  <div id="chatList"></div>
  <button id="memoryBtn">Память</button>
</div>

<div id="main">
  <div id="topbar">
    <button id="burger">☰</button>
    <div id="titleBar">S4.6</div>
  </div>
  <div id="chat"></div>
  <div id="imgPreview">
    <img id="imgPreviewThumb" src="">
    <span id="imgPreviewRemove">убрать</span>
  </div>
  <div id="inputBar">
    <button class="iconBtn" id="attachBtn" title="Прикрепить фото">📎</button>
    <input id="fileInput" type="file" accept="image/*" style="display:none">
    <button class="iconBtn" id="micBtn" title="Голосовой ввод">🎤</button>
    <input id="input" placeholder="Напиши..." />
    <button id="send">→</button>
  </div>
</div>

<div id="memoryModal">
  <div id="memoryBox">
    <h3>Память</h3>
    <textarea id="memoryText" placeholder="Тут будут сохранённые факты. Можно редактировать руками."></textarea>
    <div class="row">
      <button id="memClose">Закрыть</button>
      <button id="memSave">Сохранить</button>
    </div>
  </div>
</div>

<script>
// фикс высоты вьюпорта под клавиатуру iOS Safari
function setVH() {
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
}
setVH();
window.addEventListener('resize', setVH);
if (window.visualViewport) window.visualViewport.addEventListener('resize', setVH);

const LS_CHATS = 'chats_v1';
const LS_MEMORY = 'memory_v1';

let chats = JSON.parse(localStorage.getItem(LS_CHATS) || '[]');
let memory = localStorage.getItem(LS_MEMORY) || '';
let activeId = null;

const chatEl = document.getElementById('chat');
const chatListEl = document.getElementById('chatList');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const sidebar = document.getElementById('sidebar');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const micBtn = document.getElementById('micBtn');
const imgPreview = document.getElementById('imgPreview');
const imgPreviewThumb = document.getElementById('imgPreviewThumb');

let attachedImage = null;

function isMobile() { return window.innerWidth <= 820; }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function saveChats() { localStorage.setItem(LS_CHATS, JSON.stringify(chats)); }
function saveMemory() { localStorage.setItem(LS_MEMORY, memory); }

function newChat() {
  const c = { id: uid(), title: 'Новый чат', messages: [] };
  chats.unshift(c);
  activeId = c.id;
  saveChats();
  renderChatList();
  renderMessages();
  if (isMobile()) sidebar.classList.add('hidden');
}

function getActive() { return chats.find(c => c.id === activeId); }

function renderChatList() {
  chatListEl.innerHTML = '';
  chats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chatItem' + (c.id === activeId ? ' active' : '');
    div.innerHTML = '<span>' + c.title + '</span><span class="del" data-id="' + c.id + '">✕</span>';
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        chats = chats.filter(x => x.id !== c.id);
        saveChats();
        if (activeId === c.id) {
          activeId = chats[0] ? chats[0].id : null;
          if (!activeId) newChat();
        }
        renderChatList();
        renderMessages();
        return;
      }
      activeId = c.id;
      renderChatList();
      renderMessages();
      if (isMobile()) sidebar.classList.add('hidden');
    });
    chatListEl.appendChild(div);
  });
}

function renderMessages() {
  chatEl.innerHTML = '';
  const c = getActive();
  if (!c) return;
  c.messages.forEach(m => addBubble(m.content, m.role, m.image));
}

function addBubble(text, role, imageUrl) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : role === 'sys' ? 'sys' : 'bot');
  if (text) div.appendChild(document.createTextNode(text));
  if (imageUrl) {
    const img = document.createElement('img');
    img.src = imageUrl;
    img.className = 'msgImg';
    div.appendChild(img);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function callModel(payload) {
  return await puter.ai.chat(payload, { model: 'claude-sonnet-4-6' });
}

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    attachedImage = reader.result;
    imgPreviewThumb.src = attachedImage;
    imgPreview.classList.add('show');
  };
  reader.readAsDataURL(file);
});

document.getElementById('imgPreviewRemove').addEventListener('click', () => {
  attachedImage = null;
  fileInput.value = '';
  imgPreview.classList.remove('show');
  imgPreviewThumb.src = '';
});

let recognition = null;
let recognizing = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    inputEl.value += (inputEl.value ? ' ' : '') + e.results[0][0].transcript;
  };
  recognition.onend = () => { recognizing = false; micBtn.classList.remove('recording'); };
  micBtn.addEventListener('click', () => {
    if (recognizing) { recognition.stop(); return; }
    recognizing = true;
    micBtn.classList.add('recording');
    recognition.start();
  });
} else {
  micBtn.addEventListener('click', () => alert('Голосовой ввод не поддерживается этим браузером'));
}

async function sendMessage() {
  const text = inputEl.value.trim();
  const image = attachedImage;
  if (!text && !image) return;
  const c = getActive();

  inputEl.value = '';
  attachedImage = null;
  fileInput.value = '';
  imgPreview.classList.remove('show');
  imgPreviewThumb.src = '';

  const m = text.match(/^запомни[:,]?\s*(.+)/i);
  if (m && !image) {
    memory += (memory ? '\n' : '') + m[1];
    saveMemory();
    c.messages.push({ role: 'sys', content: 'Запомнено: ' + m[1] });
    addBubble('Запомнено: ' + m[1], 'sys');
    return;
  }

  c.messages.push({ role: 'user', content: text });
  if (c.title === 'Новый чат') c.title = (text || 'Фото').slice(0, 30);
  saveChats();
  renderChatList();
  addBubble(text, 'user', image);

  sendBtn.disabled = true;
  const loadingBubble = addBubble('...', 'sys');

  const identityPrompt = [{ role: 'user', content: 'Контекст: ты — Claude Sonnet 4.6 от Anthropic. Отвечай как обычно отвечал бы, не путай себя с другими моделями и версиями. Ты сейчас работаешь через API в стороннем интерфейсе, а не в официальном приложении claude.ai — поэтому у тебя нет доступа к артефактам, поиску в интернете и другим фишкам интерфейса, это ограничение среды, а не твоё. Если тебя об этом спросят — спокойно и без извинений объясни это как факт, не оправдывайся.' }];
  const systemPrompt = memory ? [{ role: 'user', content: 'Вот что ты знаешь обо мне, учитывай в ответах: ' + memory }] : [];
  const payload = [...identityPrompt, ...systemPrompt, ...c.messages.filter(x => x.role !== 'sys').map(x => ({ role: x.role, content: x.content || '' }))];

  let lastError = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const response = await callModel(payload);
      const reply = response.message.content[0].text;
      chatEl.removeChild(loadingBubble);
      c.messages.push({ role: 'assistant', content: reply });
      saveChats();
      addBubble(reply, 'bot');
      sendBtn.disabled = false;
      return;
    } catch (e) {
      lastError = e;
      if (attempt === 0) await new Promise(r => setTimeout(r, 1200));
    }
  }

  chatEl.removeChild(loadingBubble);
  addBubble('Ошибка связи: ' + lastError.message, 'sys');
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
document.getElementById('newChatBtn').addEventListener('click', newChat);
document.getElementById('burger').addEventListener('click', () => sidebar.classList.toggle('hidden'));

document.getElementById('memoryBtn').addEventListener('click', () => {
  document.getElementById('memoryText').value = memory;
  document.getElementById('memoryModal').classList.add('show');
});

document.getElementById('memClose').addEventListener('click', () => {
  document.getElementById('memoryModal').classList.remove('show');
});

document.getElementById('memSave').addEventListener('click', () => {
  memory = document.getElementById('memoryText').value;
  saveMemory();
  document.getElementById('memoryModal').classList.remove('show');
});

if (chats.length === 0) newChat();
else {
  activeId = chats[0].id;
  renderChatList();
  renderMessages();
}
if (isMobile()) sidebar.classList.add('hidden');
</script>
</body>
</html>
