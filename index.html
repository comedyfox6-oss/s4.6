<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>S4.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S4.6">
<script src="https://js.puter.com/v2/"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #faf9f5; color: #3d3d3a; height: 100vh; display: flex; overflow: hidden;
  }

  #sidebar { width: 260px; background: #f4f3ee; border-right: 1px solid #e5e3da; display: flex; flex-direction: column; flex-shrink: 0; transition: margin-left .2s; }
  #sidebar.hidden { margin-left: -260px; }
  #brand { font-family: Georgia, "Times New Roman", serif; font-size: 20px; padding: 18px 16px 10px; color: #3d3d3a; }
  #newChatBtn { margin: 6px 12px 12px; padding: 10px; border: 1px solid #d8d5c9; border-radius: 10px; background: #ffffff; color: #3d3d3a; cursor: pointer; text-align: left; font-size: 14px; }
  #newChatBtn:hover { background: #eeece2; }
  #chatList { flex: 1; overflow-y: auto; padding: 0 8px; }
  .chatItem { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #6b685f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .chatItem:hover { background: #eeece2; }
  .chatItem.active { background: #ede6da; color: #3d3d3a; }
  .chatItem .del { opacity: 0; font-size: 12px; color: #a39d8c; }
  .chatItem:hover .del { opacity: 1; }
  #memoryBtn { margin: 8px 12px 14px; padding: 8px 10px; border: 1px solid #d8d5c9; border-radius: 10px; background: #ffffff; color: #6b685f; cursor: pointer; font-size: 12px; }
  #memoryBtn:hover { background: #eeece2; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #faf9f5; }
  #topbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #ece9e0; }
  #burger { background: none; border: none; color: #6b685f; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  #burger:hover { background: #ece9e0; }
  #titleBar { font-size: 14px; color: #a39d8c; letter-spacing: .3px; }

  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 72%; padding: 11px 16px; border-radius: 18px; white-space: pre-wrap; line-height: 1.5; font-size: 15px; }
  .user { align-self: flex-end; background: #da7756; color: #fff; }
  .bot { align-self: flex-start; background: #f0eee6; color: #3d3d3a; }
  .sys { align-self: center; background: transparent; color: #a39d8c; font-size: 12px; font-style: italic; }

  #inputBar { display: flex; gap: 10px; padding: 14px 16px 20px; }
  #input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #d8d5c9; background: #fff; color: #3d3d3a; font-size: 15px; outline: none; }
  #input:focus { border-color: #da7756; }
  #send { padding: 0 20px; border: none; border-radius: 24px; background: #da7756; color: white; cursor: pointer; font-size: 14px; }
  #send:hover { background: #c8663f; }
  #send:disabled { background: #d8d5c9; cursor: default; }

  #memoryModal { display: none; position: fixed; inset: 0; background: rgba(61,61,58,.4); align-items: center; justify-content: center; z-index: 10; }
  #memoryModal.show { display: flex; }
  #memoryBox { background: #faf9f5; border-radius: 14px; padding: 20px; width: 90%; max-width: 480px; border: 1px solid #e5e3da; }
  #memoryBox h3 { margin-top: 0; font-size: 15px; font-weight: 600; color: #3d3d3a; }
  #memoryText { width: 100%; height: 160px; background: #fff; color: #3d3d3a; border: 1px solid #d8d5c9; border-radius: 8px; padding: 10px; font-size: 13px; resize: vertical; }
  #memoryBox .row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  #memoryBox button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
  #memClose { background: #ece9e0; color: #6b685f; }
  #memSave { background: #da7756; color: white; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand">S4.6</div>
  <button id="newChatBtn">+ Новый чат</button>
  <div id="chatList"></div>
  <button id="memoryBtn">Память</button>
</div>

<div id="main">
  <div id="topbar">
    <button id="burger">☰</button>
    <div id="titleBar">S4.6</div>
  </div>
  <div id="chat"></div>
  <div id="inputBar">
    <input id="input" placeholder="Напиши... («запомни ...» сохранит факт в память)" />
    <button id="send">→</button>
  </div>
</div>

<div id="memoryModal">
  <div id="memoryBox">
    <h3>Память</h3>
    <textarea id="memoryText" placeholder="Тут будут сохранённые факты. Можно редактировать руками."></textarea>
    <div class="row">
      <button id="memClose">Закрыть</button>
      <button id="memSave">Сохранить</button>
    </div>
  </div>
</div>

<script>
const LS_CHATS = 'chats_v1';
const LS_MEMORY = 'memory_v1';

let chats = JSON.parse(localStorage.getItem(LS_CHATS) || '[]');
let memory = localStorage.getItem(LS_MEMORY) || '';
let activeId = null;

const chatEl = document.getElementById('chat');
const chatListEl = document.getElementById('chatList');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const sidebar = document.getElementById('sidebar');

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function saveChats() { localStorage.setItem(LS_CHATS, JSON.stringify(chats)); }
function saveMemory() { localStorage.setItem(LS_MEMORY, memory); }

function newChat() {
  const c = { id: uid(), title: 'Новый чат', messages: [] };
  chats.unshift(c);
  activeId = c.id;
  saveChats();
  renderChatList();
  renderMessages();
}

function getActive() { return chats.find(c => c.id === activeId); }

function renderChatList() {
  chatListEl.innerHTML = '';
  chats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chatItem' + (c.id === activeId ? ' active' : '');
    div.innerHTML = '<span>' + c.title + '</span><span class="del" data-id="' + c.id + '">✕</span>';
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        chats = chats.filter(x => x.id !== c.id);
        saveChats();
        if (activeId === c.id) { activeId = chats[0] ? chats[0].id : null; if (!activeId) newChat(); }
        renderChatList();
        renderMessages();
        return;
      }
      activeId = c.id;
      renderChatList();
      renderMessages();
    });
    chatListEl.appendChild(div);
  });
}

function renderMessages() {
  chatEl.innerHTML = '';
  const c = getActive();
  if (!c) return;
  c.messages.forEach(m => addBubble(m.content, m.role));
}

function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : role === 'sys' ? 'sys' : 'bot');
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function callModel(payload) {
  return await puter.ai.chat(payload, { model: 'claude-sonnet-4-6' });
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  const c = getActive();
  inputEl.value = '';

  const m = text.match(/^запомни[:,]?\s*(.+)/i);
  if (m) {
    memory += (memory ? '\n' : '') + m[1];
    saveMemory();
    c.messages.push({ role: 'sys', content: 'Запомнено: ' + m[1] });
    addBubble('Запомнено: ' + m[1], 'sys');
    return;
  }

  c.messages.push({ role: 'user', content: text });
  if (c.title === 'Новый чат') c.title = text.slice(0, 30);
  saveChats();
  renderChatList();
  addBubble(text, 'user');

  sendBtn.disabled = true;
  const loadingBubble = addBubble('...', 'sys');

  const identityPrompt = [{ role: 'user', content: 'Контекст: ты — Claude Sonnet 4.6 от Anthropic. Отвечай как обычно отвечал бы, не путай себя с другими моделями и версиями. Ты сейчас работаешь через API в стороннем интерфейсе, а не в официальном приложении claude.ai — поэтому у тебя нет доступа к артефактам, поиску в интернете и другим фишкам интерфейса, это ограничение среды, а не твоё. Если тебя об этом спросят — спокойно и без извинений объясни это как факт, не оправдывайся.' }];
  const systemPrompt = memory ? [{ role: 'user', content: 'Вот что ты знаешь обо мне, учитывай в ответах: ' + memory }] : [];
  const payload = [...identityPrompt, ...systemPrompt, ...c.messages.filter(x => x.role !== 'sys')];

  let lastError = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const response = await callModel(payload);
      const reply = response.message.content[0].text;
      chatEl.removeChild(loadingBubble);
      c.messages.push({ role: 'assistant', content: reply });
      saveChats();
      addBubble(reply, 'bot');
      sendBtn.disabled = false;
      return;
    } catch (e) {
      lastError = e;
      if (attempt === 0) await new Promise(r => setTimeout(r, 1200));
    }
  }
  chatEl.removeChild(loadingBubble);
  addBubble('Ошибка связи: ' + lastError.message, 'sys');
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
document.getElementById('newChatBtn').addEventListener('click', newChat);
document.getElementById('burger').addEventListener('click', () => sidebar.classList.toggle('hidden'));

document.getElementById('memoryBtn').addEventListener('click', () => {
  document.getElementById('memoryText').value = memory;
  document.getElementById('memoryModal').classList.add('show');
});
document.getElementById('memClose').addEventListener('click', () => {
  document.getElementById('memoryModal').classList.remove('show');
});
document.getElementById('memSave').addEventListener('click', () => {
  memory = document.getElementById('memoryText').value;
  saveMemory();
  document.getElementById('memoryModal').classList.remove('show');
});

if (chats.length === 0) newChat();
else { activeId = chats[0].id; renderChatList(); renderMessages(); }
</script>
</body>
</html>
