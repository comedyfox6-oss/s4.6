<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>S4.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S4.6">
<script src="https://js.puter.com/v2/"></script>
<style>
  html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #faf9f5;
    color: #3d3d3a;
    height: 100vh;
    height: 100dvh;
    display: flex;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #input, #memoryText, #chat, .msg, #chatList {
    -webkit-user-select: text;
    user-select: text;
  }

  /* сайдбар — всегда оверлей поверх чата */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 40;
    width: min(82vw, 300px);
    background: #f4f3ee;
    border-right: 1px solid #e5e3da;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform .2s ease;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 8px 0 24px rgba(0,0,0,.08);
  }
  #sidebar:not(.hidden) { transform: translateX(0); }
  #overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.25); z-index: 35;
  }
  #overlay.show { display: block; }

  #brand { font-family: Georgia, "Times New Roman", serif; font-size: 20px; padding: 18px 16px 10px; }
  #newChatBtn { margin: 6px 12px 12px; padding: 10px; border: 1px solid #d8d5c9; border-radius: 10px; background: #fff; color: #3d3d3a; cursor: pointer; text-align: left; font-size: 14px; }
  #newChatBtn:hover { background: #eeece2; }
  #chatList { flex: 1; overflow-y: auto; padding: 0 8px; }
  .chatItem { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #6b685f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .chatItem:hover { background: #eeece2; }
  .chatItem.active { background: #ede6da; color: #3d3d3a; }
  .chatItem .del { opacity: 0; font-size: 12px; color: #a39d8c; }
  .chatItem:hover .del { opacity: 1; }
  #memoryBtn { margin: 8px 12px 14px; padding: 8px 10px; border: 1px solid #d8d5c9; border-radius: 10px; background: #fff; color: #6b685f; cursor: pointer; font-size: 12px; }
  #memoryBtn:hover { background: #eeece2; }

  /* основной чат — почти весь экран */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  #burger {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;
    z-index: 20;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid #e5e3da;
    background: rgba(250,249,245,.9);
    backdrop-filter: blur(6px);
    color: #6b685f;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #chat {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: calc(56px + env(safe-area-inset-top)) 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg { max-width: 80%; padding: 11px 16px; border-radius: 18px; white-space: pre-wrap; line-height: 1.5; font-size: 15.5px; overflow-wrap: anywhere; word-break: break-word; }
  .user { align-self: flex-end; background: #da7756; color: #fff; }
  .bot { align-self: flex-start; background: #f0eee6; color: #3d3d3a; }
  .sys { align-self: center; background: transparent; color: #a39d8c; font-size: 12px; font-style: italic; }
  .msgImg { max-width: 100%; height: auto; border-radius: 12px; display: block; margin-top: 6px; }

  #imgPreview { display: none; padding: 0 16px 6px; flex-shrink: 0; }
  #imgPreview.show { display: flex; align-items: center; gap: 8px; }
  #imgPreview img { height: 44px; border-radius: 8px; }
  #imgPreview span { font-size: 12px; color: #a39d8c; cursor: pointer; }

  #inputBar {
    display: flex;
    gap: 6px;
    padding: 8px 10px calc(10px + env(safe-area-inset-bottom));
    align-items: center;
    flex-shrink: 0;
    background: #faf9f5;
    border-top: 1px solid #ece9e0;
  }

  #input { flex: 1; min-width: 0; padding: 11px 15px; border-radius: 22px; border: 1px solid #d8d5c9; background: #fff; color: #3d3d3a; font-size: 16px; outline: none; }
  #input:focus { border-color: #da7756; }
  #send { padding: 0; width: 38px; height: 38px; border: none; border-radius: 50%; background: #da7756; color: white; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #send:hover { background: #c8663f; }
  #send:disabled { background: #d8d5c9; cursor: default; }

  .iconBtn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d8d5c9; background: #fff; color: #6b685f; cursor: pointer; font-size: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; }
  .iconBtn:hover { background: #eeece2; }
  .iconBtn.recording { background: #da7756; color: #fff; border-color: #da7756; }

  #memoryModal { display: none; position: fixed; inset: 0; background: rgba(61,61,58,.4); align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  #memoryModal.show { display: flex; }
  #memoryBox { background: #faf9f5; border-radius: 14px; padding: 20px; width: min(90vw, 480px); border: 1px solid #e5e3da; }
  #memoryBox h3 { margin-top: 0; font-size: 15px; font-weight: 600; }
  #memoryText { width: 100%; height: 160px; background: #fff; color: #3d3d3a; border: 1px solid #d8d5c9; border-radius: 8px; padding: 10px; font-size: 13px; resize: vertical; }
  #memoryBox .row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  #memoryBox button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
  #memClose { background: #ece9e0; color: #6b685f; }
  #memSave { background: #da7756; color: white; }
</style>
</head>
<body>

<div id="overlay"></div>
<div id="sidebar" class="hidden">
  <div id="brand">S4.6</div>
  <button id="newChatBtn">+ Новый чат</button>
  <div id="chatList"></div>
  <button id="memoryBtn">Память</button>
</div>

<button id="burger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>

<div id="main">
  <div id="chat"></div>
  <div id="imgPreview">
    <img id="imgPreviewThumb" src="">
    <span id="imgPreviewRemove">убрать</span>
  </div>
  <div id="inputBar">
    <button class="iconBtn" id="attachBtn" title="Прикрепить фото">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input id="fileInput" type="file" accept="image/*" style="display:none">
    <button class="iconBtn" id="micBtn" title="Голосовой ввод">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
    </button>
    <input id="input" placeholder="Напиши..." />
    <button id="send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>
</div>

<div id="memoryModal">
  <div id="memoryBox">
    <h3>Память</h3>
    <textarea id="memoryText" placeholder="Тут будут сохранённые факты. Можно редактировать руками."></textarea>
    <div class="row">
      <button id="memClose">Закрыть</button>
      <button id="memSave">Сохранить</button>
    </div>
  </div>
</div>

<script>
const LS_CHATS = 'chats_v1';
const LS_MEMORY = 'memory_v1';

let chats = JSON.parse(localStorage.getItem(LS_CHATS) || '[]');
let memory = localStorage.getItem(LS_MEMORY) || '';
let activeId = null;

const chatEl = document.getElementById('chat');
const chatListEl = document.getElementById('chatList');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const micBtn = document.getElementById('micBtn');
const imgPreview = document.getElementById('imgPreview');
const imgPreviewThumb = document.getElementById('imgPreviewThumb');

let attachedImage = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function saveChats() { localStorage.setItem(LS_CHATS, JSON.stringify(chats)); }
function saveMemory() { localStorage.setItem(LS_MEMORY, memory); }

function openSidebar() { sidebar.classList.remove('hidden'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.add('hidden'); overlay.classList.remove('show'); }

function newChat() {
  const c = { id: uid(), title: 'Новый чат', messages: [] };
  chats.unshift(c);
  activeId = c.id;
  saveChats();
  renderChatList();
  renderMessages();
  closeSidebar();
}

function getActive() { return chats.find(c => c.id === activeId); }

function renderChatList() {
  chatListEl.innerHTML = '';
  chats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chatItem' + (c.id === activeId ? ' active' : '');
    div.innerHTML = '<span>' + c.title + '</span><span class="del" data-id="' + c.id + '">✕</span>';
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        chats = chats.filter(x => x.id !== c.id);
        saveChats();
        if (activeId === c.id) {
          activeId = chats[0] ? chats[0].id : null;
          if (!activeId) newChat();
        }
        renderChatList();
        renderMessages();
        return;
      }
      activeId = c.id;
      renderChatList();
      renderMessages();
      closeSidebar();
    });
    chatListEl.appendChild(div);
  });
}

function renderMessages() {
  chatEl.innerHTML = '';
  const c = getActive();
  if (!c) return;
  c.messages.forEach(m => addBubble(m.content, m.role, m.image));
}

function addBubble(text, role, imageUrl) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : role === 'sys' ? 'sys' : 'bot');
  if (text) div.appendChild(document.createTextNode(text));
  if (imageUrl) {
    const img = document.createElement('img');
    img.src = imageUrl;
    img.className = 'msgImg';
    div.appendChild(img);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function callModel(payload) {
  return await puter.ai.chat(payload, { model: 'claude-sonnet-4-6' });
}

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    attachedImage = reader.result;
    imgPreviewThumb.src = attachedImage;
    imgPreview.classList.add('show');
  };
  reader.readAsDataURL(file);
});
document.getElementById('imgPreviewRemove').addEventListener('click', () => {
  attachedImage = null;
  fileInput.value = '';
  imgPreview.classList.remove('show');
  imgPreviewThumb.src = '';
});

let recognition = null;
let recognizing = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    inputEl.value += (inputEl.value ? ' ' : '') + e.results[0][0].transcript;
  };
  recognition.onend = () => { recognizing = false; micBtn.classList.remove('recording'); };
  micBtn.addEventListener('click', () => {
    if (recognizing) { recognition.stop(); return; }
    recognizing = true;
    micBtn.classList.add('recording');
    recognition.start();
  });
} else {
  micBtn.addEventListener('click', () => alert('Голосовой ввод не поддерживается этим браузером'));
}

async function sendMessage() {
  const text = inputEl.value.trim();
  const image = attachedImage;
  if (!text && !image) return;
  const c = getActive();

  inputEl.value = '';
  attachedImage = null;
  fileInput.value = '';
  imgPreview.classList.remove('show');
  imgPreviewThumb.src = '';

  const m = text.match(/^запомни[:,]?\s*(.+)/i);
  if (m && !image) {
    memory += (memory ? '\n' : '') + m[1];
    saveMemory();
    c.messages.push({ role: 'sys', content: 'Запомнено: ' + m[1] });
    addBubble('Запомнено: ' + m[1], 'sys');
    return;
  }

  c.messages.push({ role: 'user', content: text });
  if (c.title === 'Новый чат') c.title = (text || 'Фото').slice(0, 30);
  saveChats();
  renderChatList();
  addBubble(text, 'user', image);

  sendBtn.disabled = true;
  const loadingBubble = addBubble('...', 'sys');

  const identityPrompt = [{ role: 'user', content: 'Контекст: ты — Claude Sonnet 4.6 от Anthropic. Отвечай как обычно отвечал бы, не путай себя с другими моделями и версиями. Ты сейчас работаешь через API в стороннем интерфейсе, а не в официальном приложении claude.ai — поэтому у тебя нет доступа к артефактам, поиску в интернете и другим фишкам интерфейса, это ограничение среды, а не твоё. Если тебя об этом спросят — спокойно и без извинений объясни это как факт, не оправдывайся.' }];
  const systemPrompt = memory ? [{ role: 'user', content: 'Вот что ты знаешь обо мне, учитывай в ответах: ' + memory }] : [];
  const payload = [...identityPrompt, ...systemPrompt, ...c.messages.filter(x => x.role !== 'sys').map(x => ({ role: x.role, content: x.content || '' }))];

  let lastError = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const response = await callModel(payload);
      const reply = response.message.content[0].text;
      chatEl.removeChild(loadingBubble);
      c.messages.push({ role: 'assistant', content: reply });
      saveChats();
      addBubble(reply, 'bot');
      sendBtn.disabled = false;
      return;
    } catch (e) {
      lastError = e;
      if (attempt === 0) await new Promise(r => setTimeout(r, 1200));
    }
  }

  chatEl.removeChild(loadingBubble);
  addBubble('Ошибка связи: ' + lastError.message, 'sys');
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
document.getElementById('newChatBtn').addEventListener('click', newChat);
document.getElementById('burger').addEventListener('click', openSidebar);
overlay.addEventListener('click', closeSidebar);

document.getElementById('memoryBtn').addEventListener('click', () => {
  document.getElementById('memoryText').value = memory;
  document.getElementById('memoryModal').classList.add('show');
});
document.getElementById('memClose').addEventListener('click', () => {
  document.getElementById('memoryModal').classList.remove('show');
});
document.getElementById('memSave').addEventListener('click', () => {
  memory = document.getElementById('memoryText').value;
  saveMemory();
  document.getElementById('memoryModal').classList.remove('show');
});

if (chats.length === 0) newChat();
else {
  activeId = chats[0].id;
  renderChatList();
  renderMessages();
}
</script>
</body>
</html>
